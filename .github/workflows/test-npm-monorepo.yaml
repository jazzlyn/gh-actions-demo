---
name: test node monorepo (demo)

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
    paths:
      - monorepo-app-a/**
      - monorepo-app-b/**
      - monorepo-app-c/**
      - shared/**

concurrency:
  group: test-node-monorepo-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  get-changed-files:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    outputs:
      packages: ${{ steps.changed-files.outputs.changed_keys }}
    steps:
      # https://github.com/marketplace/actions/checkout
      - name: checkout
        uses: actions/checkout@v6

      # https://github.com/marketplace/actions/changed-files
      - name: get changed files per package
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          matrix: true
          files_yaml: |
            monorepo-app-a:
              - monorepo-app-a/**
            monorepo-app-b:
              - monorepo-app-b/**
              - shared/**
            monorepo-app-c:
              - monorepo-app-c/**
              - shared/**

      - name: list all changed files
        run: |
          echo "${{ steps.changed-files.outputs.changed_keys }}" >> "$GITHUB_STEP_SUMMARY"

  test-npm:
    needs: get-changed-files
    if: needs.get-changed-files.outputs.packages != '[]'
    strategy:
      fail-fast: false
      matrix:
        path: ${{ fromJSON(needs.get-changed-files.outputs.packages) }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.path }}
    steps:
      # https://github.com/marketplace/actions/checkout
      - name: checkout
        uses: actions/checkout@v6

      # https://github.com/marketplace/actions/cache
      - name: cache node modules
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles(format('{0}/package-lock.json', matrix.path)) }}

      # https://github.com/marketplace/actions/setup-node-js-environment
      - name: setup node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: install
        run: npm ci

      - name: lint
        run: npm run lint && npm run typecheck

      - name: test
        run: npm run test

      - name: build
        run: npm run build
